name: Bug report
description: Report a reproducible behavior or rendering problem.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observable problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the level, input sequence, resource source type, and replay if available.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Windows, Linux, macOS, Android, or iOS
    validations:
      required: true
